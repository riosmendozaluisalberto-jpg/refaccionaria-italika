<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Contáctanos</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    font-family: Arial, sans-serif;
    background: white;
    text-align: center;
}

/* ESTRUCTURA */
.wrapper {
    min-height: 100%;
    display: flex;
    flex-direction: column;
}

.contenido {
    flex: 1;
}

/* HEADER */
header {
    background: #4916c2;
    padding: 20px;
    color: white;
    font-size: 20px;
}

/* BOTÓN MENÚ */
.boton-menu {
    background: #0d47a1;
    color: white;
    border: none;
    padding: 10px 15px;
    border-radius: 6px;
    cursor: pointer;
    margin: 10px;
}

/* FORMULARIO */
.contacto {
    padding: 30px;
}

.contacto form {
    max-width: 400px;
    margin: auto;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.contacto label {
    text-align: left;
    font-weight: bold;
    font-size: 14px;
}

.contacto input,
.contacto textarea,
.contacto select {
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-size: 14px;
}

.contacto textarea {
    resize: none;
    height: 80px;
}

/* BOTÓN */
.contacto button {
    padding: 12px;
    background: #2b2b2b;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

.contacto button:hover {
    background: #444;
}

/* CUENTA */
.cuenta {
    background: #f2f2f2;
    padding: 10px;
    border-radius: 8px;
    font-weight: bold;
}

/* FOOTER */
footer {
    background: #4916c2;
    color: white;
    padding: 15px;
    font-size: 14px;
}

/* WHATSAPP */
.whatsapp {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #25D366;
    color: white;
    border-radius: 50%;
    padding: 15px;
    font-size: 25px;
    text-decoration: none;
    box-shadow: 2px 2px 10px rgba(0,0,0,0.3);
}

.whatsapp:hover {
    background: #1ebe5d;
}
</style>

</head>

<body>

<div class="wrapper">
<div class="contenido">

<header>
    📞 Contáctanos - Refaccionaria Italika
</header>

<section class="contacto">

    <form id="form-pedido">

        <label>Nombre completo</label>
        <input type="text" id="nombre" placeholder="Escribe tu nombre" required>

        <label>Número de teléfono</label>
        <input type="tel" id="telefono" placeholder="Ej: 55 1234 5678" required>

        <label>Dirección</label>
        <input type="text" id="direccion" placeholder="Tu dirección completa">

        <label>Mensaje / Pedido</label>
        <textarea id="mensaje" placeholder="Escribe lo que necesitas" required></textarea>

        <label>Método de pago</label>
        <select id="pago">
            <option value="No seleccionado">Selecciona una opción</option>
            <option value="Efectivo">Efectivo</option>
            <option value="Transferencia">Transferencia</option>
            <option value="Depósito bancario">Depósito bancario</option>
        </select>

        <label>Número de cuenta</label>
        <div class="cuenta">
            1234 5678 9012 3456
        </div>

        <button type="submit" id="btn-enviar">Enviar pedido</button>

    </form>

</section>

<button class="boton-menu" onclick="window.location.href='menu.html'">
⬅ Volver al menú
</button>

</div>

<!-- FOOTER -->
<footer>
  © 2026 Refaccionaria Italika <br>
  Tel: +52 1 220 499 5168<br>
  Oaxaca, México
</footer>

</div>

<!-- WHATSAPP -->
<a href="https://wa.me/5212204995168" class="whatsapp" target="_blank">
💬
</a>

<!-- LIBRERIA SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
    // 1. Configuración corregida
    const SUPABASE_URL = 'https://aibmopdmhvpbbjujxuxn.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_3JlqDLi5gqYsNctMyirpNA_3CrMHTTc'; 
    
    // Cambiamos el nombre de la constante para evitar conflictos con la librería
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // 2. Captura del formulario
    const formPedido = document.getElementById('form-pedido');

    formPedido.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const btn = document.getElementById('btn-enviar');
        btn.innerText = "Enviando...";
        btn.disabled = true;

        // Recolectar datos de los inputs
        const datos = {
            nombre: document.getElementById('nombre').value,
            telefono: document.getElementById('telefono').value,
            direccion: document.getElementById('direccion').value,
            mensaje: document.getElementById('mensaje').value,
            metodo_pago: document.getElementById('pago').value
        };

        try {
            // 3. Enviar a la tabla 'contactos'
            const { error } = await supabaseClient
                .from('contactos') 
                .insert([datos]);

            if (error) {
                alert("Error de Supabase: " + error.message);
            } else {
                alert("¡Pedido enviado con éxito a la Refaccionaria!");
                formPedido.reset();
            }
        } catch (err) {
            alert("Error de conexión: " + err.message);
        } finally {
            btn.innerText = "Enviar pedido";
            btn.disabled = false;
        }
    });
</script>

</body>
</html>
