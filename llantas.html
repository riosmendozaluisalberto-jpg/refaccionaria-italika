<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Llantas para Moto</title>

<style>
html, body {
  height: 100%;
  margin: 0;
  font-family: Arial;
  background: #f4f8ff;
}

/* ESTRUCTURA */
.wrapper {
  min-height: 100%;
  display: flex;
  flex-direction: column;
}

.contenido {
  flex: 1;
}

header {
  background: #0d47a1;
  color: white;
  text-align: center;
  padding: 15px;
}

.boton-menu {
  background: #0d47a1;
  color: white;
  border: none;
  padding: 10px 15px;
  border-radius: 6px;
  cursor: pointer;
  margin: 10px;
}

.container {
  display: flex;
}

.productos {
  width: 70%;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 15px;
  padding: 20px;
}

.card {
  background: white;
  border-radius: 10px;
  padding: 10px;
  text-align: center;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

.card img {
  width: 100%;
  height: 120px;
  object-fit: cover;
  border-radius: 8px;
}

.card button {
  background: #0d47a1;
  color: white;
  border: none;
  padding: 8px;
  margin-top: 5px;
  border-radius: 5px;
  cursor: pointer;
}

.carrito {
  width: 30%;
  background: white;
  padding: 20px;
}

.item {
  display: flex;
  justify-content: space-between;
}

/* FOOTER */
footer {
  background: #0d47a1;
  color: white;
  text-align: center;
  padding: 15px;
  font-size: 14px;
}

/* WHATSAPP */
.whatsapp {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #25D366;
  color: white;
  border-radius: 50%;
  padding: 15px;
  font-size: 25px;
  text-decoration: none;
  box-shadow: 2px 2px 10px rgba(0,0,0,0.3);
}

.whatsapp:hover {
  background: #1ebe5d;
}
</style>
</head>

<body>

<div class="wrapper">
<div class="contenido">

<header>
<h1>Llantas para Moto</h1>
</header>

<div class="container">

<div class="productos" id="productos"></div>

<div class="carrito">
<h2>Carrito</h2>
<div id="listaCarrito"></div>
<p>Total: $<span id="total">0</span></p>
</div>

</div>

<button class="boton-menu" onclick="window.location.href='menu.html'">
⬅ Volver al menú
</button>

</div>

<!-- FOOTER -->
<footer>
  © 2026 Refaccionaria Italika <br>
  Tel: +52 1 220 499 5168 <br>
  Oaxaca, México
</footer>

</div>

<!-- WHATSAPP -->
<a href="https://wa.me/5212204995168" class="whatsapp" target="_blank">
💬

  const card = document.createElement("div");
  card.classList.add("card");

  carrito.push(productos[i]);

  actualizar();
}

function actualizar(){
  listaCarrito.innerHTML = "";
  carrito.forEach(p => {
    listaCarrito.innerHTML += `

}
