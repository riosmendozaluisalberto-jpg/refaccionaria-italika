<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Italika Refaccionaria - Acceso</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Italika">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f07e20, #222);
            min-height: 100vh;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            padding: 15px;
            box-sizing: border-box;
        }
        .login-container {
            background: #ffffff; 
            padding: 30px; 
            border-radius: 20px;
            /* Cuadro más grande y adaptable */
            width: 100%;
            max-width: 400px; 
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4); 
            text-align: center;
        }
        .admin-container { 
            display: none; 
            background: #fff; 
            padding: 20px; 
            border-radius: 15px; 
            width: 100%; 
            max-width: 1000px; 
        }
        .logo-img { 
            width: 150px; 
            margin-bottom: 15px; 
        }
        .logo { 
            font-size: 32px; 
            font-weight: 900; 
            color: #024e8b; 
            margin-bottom: 5px;
            text-transform: uppercase;
        }
        h2 { font-size: 22px; color: #333; margin-bottom: 20px; }
        
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { 
            font-size: 16px; 
            font-weight: bold; 
            color: #555; 
            display: block; 
            margin-bottom: 8px; 
        }
        /* Inputs más grandes para que sea fácil tocar con el dedo */
        .input-group input { 
            width: 100%; 
            padding: 15px; 
            font-size: 16px;
            border: 2px solid #eee; 
            border-radius: 12px; 
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }
        .input-group input:focus { border-color: #f07e20; }

        .btn { 
            width: 100%; 
            padding: 16px; 
            background: #024e8b; 
            border: none; 
            color: white; 
            font-size: 18px; 
            font-weight: bold;
            border-radius: 12px; 
            cursor: pointer; 
            transition: 0.3s; 
            margin-top: 10px; 
        }
        .btn:active { transform: scale(0.98); }
        .btn-crear { background: #555; margin-top: 15px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 14px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #f07e20; color: white; }
        .footer { margin-top: 25px; font-size: 14px; color: #888; }
    </style>
</head>
<body>

    <div class="login-container" id="login-box">
        <img src="logo.png" alt="Italika" class="logo-img" onerror="this.style.display='none'">
        <div class="logo">Italika</div>
        <h2 style="margin-top:0; color:#444;">Refaccionaria</h2>
        
        <div class="input-group">
            <label>Correo Electrónico</label>
            <input type="email" id="user" placeholder="ejemplo@correo.com">
        </div>

        <div class="input-group">
            <label>Contraseña</label>
            <input type="password" id="pass" placeholder="••••••••">
        </div>

        <button type="button" class="btn" onclick="validarAcceso()">Entrar al Sistema</button>
        <button type="button" class="btn btn-crear" onclick="registrarUsuario()">Crear Cuenta Nueva</button>

        <div class="footer">© 2026 Italika Refaccionaria</div>
    </div>

    <div class="admin-container" id="admin-box">
        <div class="logo">Panel de Control</div>
        <h2>Pedidos Recibidos</h2>
        <button class="btn" style="width: auto; padding: 10px 20px;" onclick="cargarDatos()">
